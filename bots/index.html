<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>JD7 BOTS CENTER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CORE STYLES -->
  <link rel="stylesheet" href="/core/theme.css">
  <link rel="stylesheet" href="/core/crystal.css">
  <link rel="stylesheet" href="/core/access.css">
  <link rel="stylesheet" href="/core/bots.css">

  <style>
    body {
      background: var(--bg-color);
      color: var(--text-color);
      transition: background 0.6s ease, color 0.6s ease;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }

    .title {
      margin-top: 40px;
      font-size: 32px;
      font-weight: 600;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 15px;
      opacity: 0.8;
      line-height: 1.6;
      max-width: 640px;
    }

    .bots-grid {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 22px;
    }
  </style>
</head>

<body class="theme-dark">

  <!-- NAVIGATION -->
  <header class="top-nav">
    <div class="top-nav-inner">
      <a href="/" class="nav-link">WORLD</a>
      <a href="/school/" class="nav-link">SCHOOL</a>
      <a href="/questrun/" class="nav-link">QUESTRUN</a>
      <a href="/nft/" class="nav-link">NFT</a>

      <div class="nav-crystal-wrapper">
        <button id="jd7-crystal" class="crystal-button">
          <div class="crystal-orbit">
            <div class="crystal-shell">
              <div class="crystal-plasma"></div>
              <div class="crystal-core"></div>
              <div class="crystal-glow"></div>
            </div>
            <div class="crystal-label">JD7 THEME</div>
          </div>
        </button>
      </div>

      <a href="/bots/" class="nav-link">BOTS</a>
    </div>
  </header>

  <!-- CONTENT -->
  <div class="page">

    <h1 class="title">JD7 BOTS CENTER</h1>
    <p class="subtitle">
      Панель управления 10 JD7‑аватарами.  
      Каждый бот — это роль, энергия, ритуал и функция в экосистеме JD7.
    </p>

    <div id="bots-grid" class="bots-grid"></div>

  </div>

  <!-- ACCESS PANEL + BUTTON -->
  <div id="access-backdrop" class="access-panel-backdrop"></div>

  <div id="access-panel" class="access-panel">
    <div class="access-panel-handle"></div>

    <div class="access-panel-header">
      <div>
        <div class="access-panel-title">JD7 ACCESS PANEL</div>
        <div class="access-panel-sub">Цветовые режимы для разных типов зрения</div>
      </div>
      <button id="access-close" class="access-panel-close">×</button>
    </div>

    <div class="access-grid">
      <button class="access-chip" data-filter="green"><div class="access-dot green"></div><div class="access-chip-label">Green</div></button>
      <button class="access-chip" data-filter="red"><div class="access-dot red"></div><div class="access-chip-label">Red</div></button>
      <button class="access-chip" data-filter="yellow"><div class="access-dot yellow"></div><div class="access-chip-label">Yellow</div></button>
      <button class="access-chip" data-filter="blue"><div class="access-dot blue"></div><div class="access-chip-label">Blue</div></button>
    </div>
  </div>

  <button id="access-button" class="access-button">
    <span class="access-icon">🎛️</span>
  </button>

  <!-- CORE SCRIPTS -->
  <script type="module">
    import { initCrystal } from "/core/crystal.js";
    import { initAccessPanel } from "/core/access.js";
    import { initEffects } from "/core/effects.js";
    import { initBots } from "/core/bots.js";

    initCrystal();
    initAccessPanel();
    initEffects();
    initBots();
  </script>

</body>
</html>
