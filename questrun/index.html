<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>JD7 QUESTRUN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CORE STYLES -->
  <link rel="stylesheet" href="/core/theme.css">
  <link rel="stylesheet" href="/core/crystal.css">
  <link rel="stylesheet" href="/core/access.css">
  <link rel="stylesheet" href="/core/quest.css">

  <style>
    body {
      background: var(--bg-color);
      color: var(--text-color);
      transition: background 0.6s ease, color 0.6s ease;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }

    .title {
      margin-top: 40px;
      font-size: 32px;
      font-weight: 600;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 15px;
      opacity: 0.8;
      line-height: 1.6;
      max-width: 640px;
    }

    .xp-box {
      margin-top: 30px;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
    }

    .xp-title {
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .xp-value {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .mission-section {
      margin-top: 40px;
    }

    .mission-title {
      font-size: 18px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .mission-list {
      display: grid;
      gap: 16px;
    }
  </style>
</head>

<body class="theme-dark">

  <!-- NAVIGATION -->
  <header class="top-nav">
    <div class="top-nav-inner">
      <a href="/" class="nav-link">WORLD</a>
      <a href="/school/" class="nav-link">SCHOOL</a>

      <div class="nav-crystal-wrapper">
        <button id="jd7-crystal" class="crystal-button">
          <div class="crystal-orbit">
            <div class="crystal-shell">
              <div class="crystal-plasma"></div>
              <div class="crystal-core"></div>
              <div class="crystal-glow"></div>
            </div>
            <div class="crystal-label">JD7 THEME</div>
          </div>
        </button>
      </div>

      <a href="/questrun/" class="nav-link">QUESTRUN</a>
      <a href="/nft/" class="nav-link">NFT</a>
      <a href="/bots/" class="nav-link">BOTS</a>
    </div>
  </header>

  <!-- CONTENT -->
  <div class="page">

    <h1 class="title">JD7 QUESTRUN</h1>
    <p class="subtitle">
      Система миссий, уровней, XP и динамической сложности.  
      5 категорий миссий · 5 уровней сложности · гибридные прогресс‑бары.
    </p>

    <!-- XP BOX -->
    <div class="xp-box">
      <div class="xp-title">Твой уровень</div>
      <div class="xp-value" id="level-display">L1</div>

      <div class="xp-title">Опыт</div>
      <div class="xp-bar">
        <div class="xp-bar-fill" id="xp-fill"></div>
      </div>
      <div class="xp-bar-text" id="xp-text">0 / 100 XP</div>
    </div>

    <!-- MISSION SECTIONS -->
    <div id="mission-container"></div>

  </div>

  <!-- ACCESS PANEL + BUTTON -->
  <div id="access-backdrop" class="access-panel-backdrop"></div>

  <div id="access-panel" class="access-panel">
    <div class="access-panel-handle"></div>

    <div class="access-panel-header">
      <div>
        <div class="access-panel-title">JD7 ACCESS PANEL</div>
        <div class="access-panel-sub">Цветовые режимы для разных типов зрения</div>
      </div>
      <button id="access-close" class="access-panel-close">×</button>
    </div>

    <div class="access-grid">
      <button class="access-chip" data-filter="green">
        <div class="access-dot green"></div>
        <div class="access-chip-label">Green</div>
        <div class="access-chip-note">Deuteranopia</div>
      </button>

      <button class="access-chip" data-filter="red">
        <div class="access-dot red"></div>
        <div class="access-chip-label">Red</div>
        <div class="access-chip-note">Protanopia</div>
      </button>

      <button class="access-chip" data-filter="yellow">
        <div class="access-dot yellow"></div>
        <div class="access-chip-label">Yellow</div>
        <div class="access-chip-note">Low Contrast</div>
      </button>

      <button class="access-chip" data-filter="blue">
        <div class="access-dot blue"></div>
        <div class="access-chip-label">Blue</div>
