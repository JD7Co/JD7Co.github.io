<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JD7 QUESTRUN</title>
  <script src="/core/jd7-core.js"></script>

  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      color: #7df9ff;
      margin-bottom: 20px;
    }
.progress-bar {
  width: 100%;
  height: 10px;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
  border: 1px solid #333;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #7df9ff, #ffcc66);
  width: 0%;
  transition: width 0.4s ease;
}
    .quest {
      background: rgba(255,255,255,0.05);
      border: 1px solid #333;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .quest-title {
      font-size: 20px;
      color: #ffcc66;
      margin-bottom: 10px;
    }

    .quest-desc {
      opacity: 0.8;
      margin-bottom: 10px;
    }

    .quest-btn {
      background: #7df9ff;
      color: #000;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      display: inline-block;
    }

    .quest-btn.completed {
      background: #444;
      color: #888;
      cursor: default;
    }
  </style>
</head>

<body>

<div id="jd7-menu"></div>
<script>
  fetch('/core/jd7-menu.html')
    .then(r => r.text())
    .then(html => document.getElementById('jd7-menu').innerHTML = html);
</script>

<h1>JD7 QUESTRUN</h1>

<div id="quests"></div>

<script>
/* ============================
      QUEST LIST
============================ */

const JD7Quests = [

  /* DAILY */
  {
    id: "d1",
    type: "daily",
    title: "Daily — Identity Ping",
    desc: "Открой SCHOOL и проверь свой уровень.",
    xp: 15,
    done: false
  },
  {
    id: "d2",
    type: "daily",
    title: "Daily — Motion Touch",
    desc: "Сделай 1 короткое видео или рилс.",
    xp: 20,
    done: false
  },

  /* CORE */
  {
    id: "c1",
    type: "core",
    title: "NFT Initiation",
    desc: "Создай своё первое NFT metadata.",
    xp: 50,
    done: false
  },

  /* WEEKLY */
  {
    id: "w1",
    type: "weekly",
    title: "Weekly — Motion Marathon",
    desc: "Создай 3 клипа или рилса за неделю.",
    xp: 120,
    progress: 0,
    goal: 3,
    done: false
  },
  {
    id: "w2",
    type: "weekly",
    title: "Weekly — NFT Builder",
    desc: "Создай 1 NFT metadata за неделю.",
    xp: 150,
    progress: 0,
    goal: 1,
    done: false
  }
];

const JD7QuestStateKey = "JD7QuestState";

/* ============================
      WEEK CHECK
============================ */

function jd7IsSameWeek(date1, date2) {
  const d1 = new Date(date1);
  const d2 = new Date(date2);

  const week1 = Math.floor((d1 - new Date(d1.getFullYear(),0,1)) / 604800000);
  const week2 = Math.floor((d2 - new Date(d2.getFullYear(),0,1)) / 604800000);

  return d1.getFullYear() === d2.getFullYear() && week1 === week2;
}

/* ============================
      LOAD STATE
============================ */

function jd7LoadQuestState() {
  const saved = localStorage.getItem(JD7QuestStateKey);
  if (!saved) return;

  const data = JSON.parse(saved);
  const today = new Date().toISOString().slice(0, 10);

  JD7Quests.forEach(q => {
    const savedQuest = data.quests[q.id];
    if (!savedQuest) return;

    if (q.type === "daily") {
      if (data.date === today) q.done = savedQuest.done;
    }

    if (q.type === "weekly") {
      if (jd7IsSameWeek(data.date, today)) {
        q.done = savedQuest.done;
        q.progress = savedQuest.progress;
      }
    }

    if (q.type === "core") {
      q.done = savedQuest.done;
    }
  });
}

/* ============================
      SAVE STATE
============================ */

function jd7SaveQuestState() {
  const today = new Date().toISOString().slice(0, 10);
  const map = {};

  JD7Quests.forEach(q => {
    map[q.id] = {
      done: q.done,
      progress: q.progress ?? 0
    };
  });

  localStorage.setItem(JD7QuestStateKey, JSON.stringify({
    date: today,
    quests: map
  }));
}

/* ============================
      RENDER
============================ */

function renderQuests() {
  const box = document.getElementById("quests");
  box.innerHTML = "";

  JD7Quests.forEach(q => {

    let progressHTML = "";
    if (q.type === "weekly") {
      progressHTML = `
        <div style="opacity:0.7;margin-bottom:6px;">
          Progress: ${q.progress} / ${q.goal}
        </div>
      `;
    }

    box.innerHTML += `
      <div class="quest">
        <div class="quest-title">${q.title}</div>
        <div class="quest-desc">${q.desc}</div>
        ${progressHTML}
        <div class="quest-btn ${q.done ? 'completed' : ''}"
             onclick="${q.done ? '' : `completeQuest('${q.id}')`}">
          ${q.done ? 'Completed' : `Claim +${q.xp} XP`}
        </div>
      </div>
    `;
  });
}

/* ============================
      COMPLETE QUEST
============================ */

function completeQuest(id) {
  const quest = JD7Quests.find(q => q.id === id);
  if (!quest || quest.done) return;

  if (quest.type === "weekly") {
    if (quest.progress < quest.goal) {
      quest.progress++;
      if (quest.progress >= quest.goal) {
        quest.done = true;
        jd7AddXP(quest.xp);
      }
    }
  } else {
    quest.done = true;
    jd7AddXP(quest.xp);
  }

  jd7SaveQuestState();
  renderQuests();
}

/* ============================
      INIT
============================ */

jd7LoadQuestState();
renderQuests();
jd7UpdateXPUI();

</script>

</body>
</html>
