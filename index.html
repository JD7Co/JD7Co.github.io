<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>JD7 WORLD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CORE STYLES -->
  <link rel="stylesheet" href="/core/theme.css">
  <link rel="stylesheet" href="/core/crystal.css">
  <link rel="stylesheet" href="/core/access.css">

  <style>
    /* Базовая структура страницы */
    body {
      background: var(--bg-color);
      color: var(--text-color);
      transition: background 0.6s ease, color 0.6s ease;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .parallax-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
      background:
        radial-gradient(circle at 10% 0%, rgba(125, 249, 255, 0.12) 0, transparent 55%),
        radial-gradient(circle at 90% 100%, rgba(155, 125, 255, 0.18) 0, transparent 60%);
      opacity: 0.9;
      transition: opacity 0.6s ease;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
      background: linear-gradient(to bottom, rgba(0,0,0,0.45), transparent);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .top-nav-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .nav-link {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245,245,245,0.7);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: 0.25s ease;
    }

    body.theme-light .nav-link,
    body.theme-ebook .nav-link {
      color: rgba(10,10,10,0.7);
    }

    .nav-link:hover {
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
      transform: translateY(-1px);
    }

    .content {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }

    .hero {
      margin-top: 40px;
      max-width: 640px;
    }

    .hero-kicker {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .hero-title {
      font-size: 32px;
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .hero-subtitle {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.8;
      margin-bottom: 24px;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }

    .tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      opacity: 0.85;
    }

    body.theme-light .tag,
    body.theme-ebook .tag {
      border-color: rgba(0,0,0,0.12);
    }
  </style>
</head>

<body class="theme-dark">
