<head>
  <meta charset="UTF-8" />

  <meta name="description" content="JD7 Ritual Tech Ecosystem — Avatars, NFT, Clips, Releases, Bots, Justice, World, School." />

  <!-- OpenGraph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="JD7 Ritual Tech Ecosystem" />
  <meta property="og:description" content="Avatars • NFT • AI Bots • Ritual Tech" />
  <meta property="og:image" content="https://jd7co.github.io/preview.jpg" />

  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      overflow-x: hidden;
      position: relative; /* FIX */
    }

    /* PARALLAX BACKGROUND LINES — FIXED */
    .bg-lines {
      position: fixed;
      top: 0;
      left: 0;
      width: 150%;
      height: 150%;
      pointer-events: none; /* FIX */
      z-index: -1; /* FIX */
      background: repeating-linear-gradient(
        90deg,
        rgba(125,249,255,0.05) 0px,
        rgba(125,249,255,0.05) 1px,
        transparent 1px,
        transparent 80px
      );
      animation: moveLines 25s linear infinite;
    }

    @keyframes moveLines {
      from { transform: translateX(0); }
      to { transform: translateX(-400px); }
    }

    /* HERO */
    h1 {
      text-align: center;
      color: #7df9ff;
      margin-top: 20px;
      margin-bottom: 10px;
      font-size: 32px;
      animation: heroPulse 4s ease-in-out infinite;
    }

    @keyframes heroPulse {
      0% { text-shadow: 0 0 4px #7df9ff; }
      50% { text-shadow: 0 0 12px #7df9ff; }
      100% { text-shadow: 0 0 4px #7df9ff; }
    }

    .subtitle {
      text-align: center;
      opacity: 0.7;
      margin-bottom: 40px;
    }

    /* Fade-in */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.6s ease forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* GRID PORTAL */
    .portal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .portal-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      text-decoration: none;
      color: #fff;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .portal-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 0 18px rgba(125,249,255,0.25);
      border-color: #7df9ff;
    }

    .portal-title {
      font-size: 18px;
      color: #ffcc66;
      margin-bottom: 6px;
    }

    /* AVATAR GRID */
    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      margin
