<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>JD7 NFT CENTER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CORE STYLES -->
  <link rel="stylesheet" href="/core/theme.css">
  <link rel="stylesheet" href="/core/crystal.css">
  <link rel="stylesheet" href="/core/access.css">
  <link rel="stylesheet" href="/core/nft.css">

  <style>
    body {
      background: var(--bg-color);
      color: var(--text-color);
      transition: background 0.6s ease, color 0.6s ease;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }

    .title {
      margin-top: 40px;
      font-size: 32px;
      font-weight: 600;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 15px;
      opacity: 0.8;
      line-height: 1.6;
      max-width: 640px;
    }

    .collection-title {
      margin-top: 40px;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .nft-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
  </style>
</head>

            </div>
            <div class="crystal-label">JD7 THEME</div>
          </div>
        </button>
      </div>

      <a href="/nft/" class="nav-link">NFT</a>
